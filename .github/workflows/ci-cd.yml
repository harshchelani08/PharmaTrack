name: PharmaTrack CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: NestJS Backend Testing and Linting
  # ----------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-size: 18
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Verify Prisma Client Code-Generation
        run: |
          cd backend
          npx prisma generate

      - name: Run Backend Integration & Unit Tests
        run: |
          cd backend
          npm run test

  # ----------------------------------------------------------------------------
  # Job 2: Go inventory Engine Concurrency validations
  # ----------------------------------------------------------------------------
  go-inventory-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Setup GoLang SDK
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache-dependency-path: 'go-inventory/go.sum'

      - name: Install dependencies & Build Check
        run: |
          cd go-inventory
          go build ./cmd/server/main.go

      - name: Run Go Unit Tests
        run: |
          cd go-inventory
          go test -v ./...

  # ----------------------------------------------------------------------------
  # Job 3: Automated Docker Build check for Production readiness
  # ----------------------------------------------------------------------------
  docker-delivery:
    needs: [backend-test, go-inventory-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Verify Backend Container Build
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: false
          tags: pharmatrack/backend:latest

      - name: Verify Go Service Container Build
        uses: docker/build-push-action@v4
        with:
          context: ./go-inventory
          push: false
          tags: pharmatrack/go-inventory:latest

      - name: Verify React Frontend Container Build
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: false
          tags: pharmatrack/frontend:latest
