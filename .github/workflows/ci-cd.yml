name: PharmaTrack CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: NestJS Backend — Install, Validate Schema, Type Check
  # ----------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm install --legacy-peer-deps

      - name: Validate Prisma Schema
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: TypeScript Syntax Check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true

  # ----------------------------------------------------------------------------
  # Job 2: React Frontend — Install & Production Build
  # ----------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Vite Production Build
        run: npx vite build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ----------------------------------------------------------------------------
  # Job 3: Go Inventory Engine — Tidy, Vet & Build
  # ----------------------------------------------------------------------------
  go-inventory-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-inventory

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Tidy Go Modules
        run: go mod tidy

      - name: Go Vet Static Analysis
        run: go vet ./...
        continue-on-error: true

      - name: Build Go Binary
        run: go build -v ./cmd/server/main.go
        continue-on-error: true

  # ----------------------------------------------------------------------------
  # Job 4: Docker Build Verification (main branch only, after all jobs pass)
  # ----------------------------------------------------------------------------
  docker-delivery:
    needs: [backend-test, frontend-build, go-inventory-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: pharmatrack/backend:ci

      - name: Build Go Service Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./go-inventory
          push: false
          tags: pharmatrack/go-inventory:ci

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: pharmatrack/frontend:ci
